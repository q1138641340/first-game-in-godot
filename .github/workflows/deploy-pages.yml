name: Deploy Web Game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7.1"
  GODOT_RELEASE: "4.7.1-stable"
  GODOT_DIR: ${{ github.workspace }}/.godot-ci
  TEMPLATE_DIR: /home/runner/.local/share/godot/export_templates/4.7.1.stable

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Godot cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GODOT_DIR }}
            ${{ env.TEMPLATE_DIR }}
          key: godot-${{ runner.os }}-${{ env.GODOT_RELEASE }}-web

      - name: Install Godot and Web templates
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -x "$GODOT_DIR/godot" ]]; then
            curl --fail --location --retry 3 \
              "https://github.com/godotengine/godot-builds/releases/download/$GODOT_RELEASE/Godot_v${GODOT_RELEASE}_linux.x86_64.zip" \
              --output /tmp/godot.zip
            echo "c7ff14fd28472c8d4f193043de30278dcf7e5241a1dcf7566b02e27addaa33ba  /tmp/godot.zip" | sha256sum --check
            mkdir -p "$GODOT_DIR"
            unzip -q /tmp/godot.zip -d "$GODOT_DIR"
            mv "$GODOT_DIR/Godot_v${GODOT_RELEASE}_linux.x86_64" "$GODOT_DIR/godot"
            chmod +x "$GODOT_DIR/godot"
          fi
          if [[ ! -f "$TEMPLATE_DIR/web_nothreads_release.zip" ]]; then
            curl --fail --location --retry 3 \
              "https://github.com/godotengine/godot-builds/releases/download/$GODOT_RELEASE/Godot_v${GODOT_RELEASE}_export_templates.tpz" \
              --output /tmp/templates.tpz
            echo "86409db6200b6f8fd3230989c2d2002851f3dd18acf11d7bdbafddf5a0dd0f72  /tmp/templates.tpz" | sha256sum --check
            mkdir -p "$TEMPLATE_DIR"
            unzip -j -q /tmp/templates.tpz 'templates/web*.zip' -d "$TEMPLATE_DIR"
          fi

      - name: Import and export Web game
        shell: bash
        run: |
          set -euo pipefail
          "$GODOT_DIR/godot" --headless --path . --import
          mkdir -p build/web
          "$GODOT_DIR/godot" --headless --path . --export-release Web build/web/index.html
          test -s build/web/index.html
          test -s build/web/index.wasm
          test -s build/web/index.pck

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
